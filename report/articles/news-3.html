<!doctype html>

    .report p, .report li { color: #dbe4f0; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;

      border-left: 0;
      border-right: 0;
    }
    .news-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }
    .news-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #202634;
      border: 1px solid #334155;
    }
    .news-link {
      color: #bfdbfe;
      font-weight: 600;
      text-decoration: none;
    }
    .news-link:hover { text-decoration: underline; }

    }

      border-radius: 12px;

      border: 1px solid #2b3446;

    .news-article h2 {
      margin: 0 0 6px;
      color: #ffffff;
      font-size: 1rem;
    }
    .disclaimer {

      padding: 14px 14px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #111827;
      color: #cbd5e1;

      .article-nav { margin-bottom: 14px; }

        <h1>외국인·기관 수급 전환 업종 확대 여부</h1>
        <div class="news-source">연합뉴스</div>
        <div class="news-article">
<p>외국인과 기관이 동시에 들어오는 업종이 넓어지면 단기 반등이 아니라 추세 확장의 신호로 읽을 여지가 커진다.</p><p>반대로 수급이 몇 개 대형주에만 쏠리면 장의 폭은 좁고 지속성은 약할 수 있다.</p>
        </div>
      </article>
